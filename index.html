<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AneyeNumber</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div id="inputPrincipal">
                Número (entre 1 e 100): <input type="number" id="Numeros"> 
                <input type="button" value="Adicionar" id="botaoAdicionar" onclick="addNumero()">
        </div>
        <div id="listaNumero">
            <select  size="7" name="listaNumeros" id="listaNumeros">
            </select>
        </div>
        <div id="botaoFinalizar">
            <input type="button" value="Finalizar" onclick="concluir()">
        </div>
        <div id="ResAnalise"></div>
    </section>
    <footer>
        <p>&copy; WelPages</p>
    </footer>
</body>
</html>
